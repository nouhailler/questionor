name: Deploy to Netlify

on:
  push:
    branches: [main]
  workflow_dispatch:

# Empêche deux déploiements concurrents ; le plus récent gagne.
concurrency:
  group: netlify-production
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Déployer app/ sur Netlify (production)
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: b230ca16-fa24-4aa2-bfb5-033bcfcc58fc
        run: >-
          npx --yes netlify-cli deploy
          --prod
          --dir app
          --message "CI: ${{ github.sha }}"
